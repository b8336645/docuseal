  require_authentication_with_user_login_or_api_key_to_access_the_document_download_links: 要求使用使用者登入或 API 金鑰進行驗證才能存取文件下載連結。
  combine_signed_documents_and_the_audit_log_into_a_single_pdf_file_for_easier_recordkeeping_and_compliance: 合併已簽署文件與稽核紀錄為單一 PDF 檔案，以便於紀錄與合規。
  require_a_jwt_authorization_to_preview_embedded_forms_ensuring_only_authorized_users_can_view_them: 要求 JWT 授權才能預覽內嵌表單，確保僅有授權使用者可檢視。
  make_all_newly_created_templates_private_to_their_creator_by_default: 預設將所有新建立的範本設為僅對建立者私有。
